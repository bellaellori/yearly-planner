<!DOCTYPE html>
<!--
  52-WEEK PLANNER
  ──────────────────────────────────────────────────────
  SETUP (one-time):
  1. Open Code.gs in Google Apps Script (script.new), paste contents,
     save, then Deploy → New deployment → Web app →
     Execute as: Me · Who has access: Only me → Deploy → copy the URL.
  2. Replace YOUR_APPS_SCRIPT_URL below with that URL.
  3. Push this file to a GitHub repo, enable Pages → done.

  Until the URL is set, data is saved to localStorage only.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>52-Week Planner</title>
  <style>
    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #F5F5F5;
      color: #2E2E2E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── App ────────────────────────────────────────────── */
    #app {
      width: 100%;
      max-width: 1140px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .app-header {
      background: white;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid #E8E4DC;
    }

    .app-header h1 {
      font-size: 1.35rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      color: #2E2E2E;
    }

    #save-status {
      font-size: 0.78rem;
      color: #999;
      font-style: italic;
      min-width: 60px;
      text-align: right;
    }

    /* ── Planner shell ──────────────────────────────────── */
    .planner-shell {
      background: white;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      box-shadow: 0 4px 28px rgba(0,0,0,0.09);
    }

    /* ── Grid ───────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    /* Quarter headers */
    .q-head {
      background: #3D3020;
      color: #F2EAD5;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.55rem 0.75rem;
      text-align: center;
      border-right: 1px solid #5C4530;
    }
    .q-head:last-child { border-right: none; }

    /* Week row cells */
    .wk-cell {
      display: flex;
      min-height: 36px;
      border-right: 1px solid rgba(0,0,0,0.07);
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .wk-cell:nth-child(4n) { border-right: none; }

    /* Row colour variants */
    .r-beige { background: #F2EAD5; }
    .r-sage  { background: #C5D4B5; }
    .r-rest  { background: #7D6348; }

    /* Week number badge */
    .wk-badge {
      width: 40px;
      min-width: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3px 0;
      border-right: 1px solid rgba(0,0,0,0.09);
      user-select: none;
      flex-shrink: 0;
    }

    .r-beige .wk-badge { background: #D4C8AD; color: #5C4530; }
    .r-sage  .wk-badge { background: #A8BF9A; color: #2D4025; }
    .r-rest  .wk-badge { background: #5C4530; color: #F2EAD5; }

    .wk-month {
      font-size: 0.52rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.75;
      line-height: 1;
    }

    .wk-num {
      font-size: 0.82rem;
      font-weight: bold;
      line-height: 1.1;
    }

    /* Content area */
    .wk-content {
      flex: 1;
      padding: 6px 10px;
      font-size: 0.84rem;
      line-height: 1.4;
      outline: none;
      min-height: 36px;
      word-break: break-word;
    }

    .r-beige .wk-content { color: #3D3020; }
    .r-sage  .wk-content { color: #253520; }
    .r-rest  .wk-content {
      color: #F2EAD5;
      font-style: italic;
      font-size: 0.75rem;
      opacity: 0.85;
      display: flex;
      align-items: center;
      cursor: default;
      pointer-events: none;
    }

    .wk-content[contenteditable="true"] {
      cursor: text;
    }
    .wk-content[contenteditable="true"]:focus {
      background: rgba(255,255,255,0.35);
    }

    /* Drag handle */
    .wk-drag {
      width: 18px;
      min-width: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      opacity: 0;
      font-size: 0.75rem;
      color: #999;
      transition: opacity 0.15s;
      user-select: none;
      flex-shrink: 0;
    }
    .wk-cell:hover .wk-drag { opacity: 1; }
    .wk-drag:active { cursor: grabbing; }

    /* Drag states */
    .wk-cell.is-dragging { opacity: 0.35; }
    .wk-cell.drag-over   { outline: 2px solid #7D6348; outline-offset: -2px; background: rgba(125,99,72,0.12); }

    /* ── PIN Gate ───────────────────────────────────────── */
    #pin-gate {
      position: fixed; inset: 0;
      background: #F5F5F5;
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    #pin-box {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.09);
      text-align: center;
      font-family: Georgia, serif;
    }
    #pin-box p { margin-bottom: 1rem; color: #5C4530; letter-spacing: 0.05em; }
    #pin-input {
      width: 120px;
      padding: 0.5rem 0.75rem;
      font-size: 1.5rem;
      letter-spacing: 0.3em;
      border: 1px solid #D4C8AD;
      border-radius: 4px;
      text-align: center;
      outline: none;
    }
    #pin-input:focus { border-color: #7D6348; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    #pin-input.shake { animation: shake 0.3s ease; }
  </style>
</head>
<body>

<!-- PIN Gate ─────────────────────────────────────────── -->
<div id="pin-gate">
  <div id="pin-box">
    <p>Enter PIN to continue</p>
    <input id="pin-input" type="password" maxlength="10" inputmode="numeric" autocomplete="off" placeholder="••••">
    <p id="pin-error" style="display:none; color:#b44; font-size:0.8rem; margin-top:0.5rem;">Incorrect PIN</p>
  </div>
</div>

<!-- App ──────────────────────────────────────────────── -->
<div id="app">
  <header class="app-header">
    <h1>52-Week Planner</h1>
    <span id="save-status"></span>
  </header>
  <div class="planner-shell">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
// ── PIN Gate ─────────────────────────────────────────────────────────────
(function() {
  const CORRECT = '7090';
  const COOKIE  = 'planner_pin';

  function getCookie(name) {
    return document.cookie.split('; ').reduce((v, c) => {
      const [k, val] = c.split('=');
      return k === name ? decodeURIComponent(val) : v;
    }, '');
  }

  function unlock() {
    document.getElementById('pin-gate').style.display = 'none';
  }

  if (getCookie(COOKIE) === CORRECT) { unlock(); return; }

  const input = document.getElementById('pin-input');
  const err   = document.getElementById('pin-error');
  input.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (input.value === CORRECT) {
      const exp = new Date(Date.now() + 365 * 864e5).toUTCString();
      document.cookie = `${COOKIE}=${CORRECT}; expires=${exp}; path=/`;
      unlock();
    } else {
      err.style.display = 'block';
      input.value = '';
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 400);
    }
  });
  input.focus();
})();

// ── Config ───────────────────────────────────────────────────────────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxQPLeeT8wo5bE2ycE2oGzi8cAsqXINjFRP0i_FkhKfxEfnT7-I7poxL9J_vJKmgCSfmg/exec';

// ── State ────────────────────────────────────────────────────────────────
let data = {};    // { week: content }
let dragSrc = null;

const MONTH_AT = {
  1:'JAN', 5:'FEB', 9:'MAR',
  14:'APR', 18:'MAY', 22:'JUN',
  27:'JUL', 31:'AUG', 35:'SEP',
  40:'OCT', 44:'NOV', 48:'DEC'
};

// Kick off immediately
loadData();

// ── Render ───────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Quarter headers
  ['Q1  Jan – Mar', 'Q2  Apr – Jun', 'Q3  Jul – Sep', 'Q4  Oct – Dec'].forEach(label => {
    const h = document.createElement('div');
    h.className = 'q-head';
    h.textContent = label;
    grid.appendChild(h);
  });

  for (let row = 0; row < 13; row++) {
    const isRest = row === 12;
    const rowCls = isRest ? 'r-rest' : (row % 2 === 0 ? 'r-beige' : 'r-sage');

    for (let q = 0; q < 4; q++) {
      const week = q * 13 + row + 1;

      const cell = document.createElement('div');
      cell.className = `wk-cell ${rowCls}`;

      // Badge
      const badge = document.createElement('div');
      badge.className = 'wk-badge';
      if (MONTH_AT[week]) {
        const m = document.createElement('span');
        m.className = 'wk-month';
        m.textContent = MONTH_AT[week];
        badge.appendChild(m);
      }
      const n = document.createElement('span');
      n.className = 'wk-num';
      n.textContent = week;
      badge.appendChild(n);

      // Content
      const content = document.createElement('div');
      content.className = 'wk-content';
      content.dataset.week = week;

      if (isRest) {
        content.textContent = 'REST  ·  REPLAN';
        cell.appendChild(badge);
        cell.appendChild(content);
      } else {
        content.contentEditable = 'true';
        content.spellcheck = false;
        content.textContent = data[week] || '';

        content.addEventListener('blur', () => {
          const txt = content.textContent.trim();
          if (txt !== (data[week] || '')) {
            data[week] = txt;
            persist(week, txt);
          }
        });

        // Drag handle
        const handle = document.createElement('div');
        handle.className = 'wk-drag';
        handle.textContent = '⠿';
        handle.title = 'Drag to swap with another week';

        // Drag events on the CELL (triggered via handle)
        cell.draggable = false; // only enabled while handle is held

        handle.addEventListener('mousedown', () => { cell.draggable = true; });
        handle.addEventListener('mouseup',   () => { cell.draggable = false; });

        cell.addEventListener('dragstart', e => {
          dragSrc = cell;
          cell.classList.add('is-dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', content.textContent);
        });

        cell.addEventListener('dragend', () => {
          cell.draggable = false;
          cell.classList.remove('is-dragging');
          document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        });

        cell.addEventListener('dragover', e => {
          e.preventDefault();
          if (dragSrc && dragSrc !== cell) cell.classList.add('drag-over');
        });

        cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));

        cell.addEventListener('drop', e => {
          e.preventDefault();
          cell.classList.remove('drag-over');
          if (!dragSrc || dragSrc === cell) return;
          const srcContent = dragSrc.querySelector('.wk-content');
          const dstContent = content;
          // Swap text
          const tmp = dstContent.textContent;
          dstContent.textContent = srcContent.textContent;
          srcContent.textContent = tmp;
          const srcWk = +srcContent.dataset.week;
          const dstWk = +dstContent.dataset.week;
          data[srcWk] = srcContent.textContent;
          data[dstWk] = dstContent.textContent;
          persist(srcWk, data[srcWk]);
          persist(dstWk, data[dstWk]);
        });

        cell.appendChild(badge);
        cell.appendChild(content);
        cell.appendChild(handle);
      }

      grid.appendChild(cell);
    }
  }
}

// ── Data: localStorage + Google Sheets via JSONP ─────────────────────────
function loadData() {
  // Always start from localStorage (instant)
  try { data = JSON.parse(localStorage.getItem('planner52') || '{}'); } catch(e) {}
  render();

  // Then sync from Sheet if connected
  if (SHEET_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  window._pLoad = d => {
    data = d || {};
    try { localStorage.setItem('planner52', JSON.stringify(data)); } catch(e) {}
    render();
  };
  jsonp(`${SHEET_URL}?action=read&callback=_pLoad&_=${Date.now()}`);
}

function persist(week, content) {
  try { localStorage.setItem('planner52', JSON.stringify(data)); } catch(e) {}
  if (SHEET_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  setStatus('saving…');
  window._pSave = () => setStatus('');
  jsonp(`${SHEET_URL}?action=write&week=${week}&content=${encodeURIComponent(content)}&callback=_pSave&_=${Date.now()}`);
}

function jsonp(url) {
  const s = document.createElement('script');
  s.src = url;
  s.onerror = () => setStatus('⚠ sync error');
  document.head.appendChild(s);
  setTimeout(() => { try { s.remove(); } catch(e) {} }, 6000);
}

function setStatus(msg) { document.getElementById('save-status').textContent = msg; }
</script>
</body>
</html>
